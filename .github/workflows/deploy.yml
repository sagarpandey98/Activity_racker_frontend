name: Deploy Frontend to GCP

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        run: |
          # We build the image and tag it for your Docker Hub account
          docker build -t ${{ secrets.DOCKER_USERNAME }}/northstar-frontend:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/northstar-frontend:latest

      - name: SSH and Update Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_IP }}
          username: sagaradavian
          key: ${{ secrets.GCP_SSH_KEY }}
          script: |
            cd ~/northstar
            # 1. Pull the fresh image from Docker Hub
            docker compose pull frontend
            # 2. Restart only the frontend service with the new code
            docker compose up -d frontend
            # 3. Clean up old images to save space on your VM
            docker image prune -f